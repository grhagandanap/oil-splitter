services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oilsplitter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oilsplitter_password}
      POSTGRES_DB: ${POSTGRES_DB:-oilsplitter_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oilsplitter}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
