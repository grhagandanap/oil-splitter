services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oilsplitter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oilsplitter_password}
      POSTGRES_DB: ${POSTGRES_DB:-oilsplitter_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
